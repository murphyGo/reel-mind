# Pipeline C — Measure & Learn
# Daily metrics ingestion + signal updates per active channel.
# STUB: finalized in U8.

name: pipeline-c-measure

on:
  schedule:
    - cron: "30 17 * * *"  # 02:30 KST daily
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Single channel ID (optional)"
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.list.outputs.channels }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv sync
      - id: list
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHANNEL_OVERRIDE: ${{ inputs.channel_id }}
        run: uv run reel-mind discover-channels --pipeline c  # TODO: implement in U8

  run:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: ${{ fromJson(needs.discover.outputs.channels) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Run Pipeline C
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          CHANNEL_ID: ${{ matrix.channel }}
        run: uv run reel-mind run-pipeline --pipeline c --channel "$CHANNEL_ID"  # TODO: implement in U5/U8
